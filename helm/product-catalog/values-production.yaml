# Production Environment Values

api:
  replicaCount: 3
  
  image:
    tag: "latest"
  
  env:
    ASPNETCORE_ENVIRONMENT: Production
    USE_IN_MEMORY_DB: "false"
    LOG_LEVEL: Warning
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

client:
  replicaCount: 3
  
  image:
    tag: "latest"
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: product-catalog.example.com
      paths:
        - path: /
          pathType: Prefix
          service: client
        - path: /api
          pathType: Prefix
          service: api
  tls:
    - secretName: production-tls
      hosts:
        - product-catalog.example.com
